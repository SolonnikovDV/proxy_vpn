# proxy-vpn — docker-based stack (WireGuard + Xray + FastAPI + Caddy)
name: proxy-vpn

services:
  caddy:
    image: caddy:2-alpine
    container_name: proxy-vpn-caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-18080}:80"
      - "${CADDY_HTTPS_PORT:-18443}:443"
    volumes:
      - ./caddy/${CADDYFILE_PATH:-Caddyfile.dev}:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - proxy-vpn
    depends_on:
      - api

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: proxy-vpn-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/app.db
      SECURITY_GUARD_URL: http://security-guard:9100
    volumes:
      - api-data:/data
      - ./xray:/xray-config:rw
      - ./wireguard/conf:/wireguard-config:rw
      - ./logs:/logs:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy-vpn
    depends_on:
      - security-guard
    expose:
      - "8000"

  security-guard:
    build:
      context: ./security_guard
      dockerfile: Dockerfile
    container_name: proxy-vpn-security-guard
    restart: unless-stopped
    environment:
      SECURITY_DB_PATH: /data/security.db
      SECURITY_GEOIP_ENABLED: ${SECURITY_GEOIP_ENABLED:-1}
      SECURITY_GEOIP_TIMEOUT_SECONDS: ${SECURITY_GEOIP_TIMEOUT_SECONDS:-1.5}
      SECURITY_DEFAULT_BLOCK_SECONDS: ${SECURITY_DEFAULT_BLOCK_SECONDS:-900}
    volumes:
      - security-data:/data
    networks:
      - proxy-vpn
    expose:
      - "9100"

  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: proxy-vpn-xray
    restart: unless-stopped
    command: ["run", "-c", "/etc/xray/config.json"]
    volumes:
      - ./xray:/etc/xray:ro
    networks:
      - proxy-vpn
    ports:
      - "${XRAY_PORT:-14443}:443/tcp"

  wireguard:
    build:
      context: ./wireguard
      dockerfile: Dockerfile
    container_name: proxy-vpn-wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ./wireguard/conf:/etc/wireguard
    ports:
      - "${WG_PORT:-51820}:51820/udp"
    networks:
      - proxy-vpn

networks:
  proxy-vpn:
    name: proxy-vpn_net
    driver: bridge

volumes:
  caddy-data:
    name: proxy-vpn_caddy_data
  caddy-config:
    name: proxy-vpn_caddy_config
  api-data:
    name: proxy-vpn_api_data
  security-data:
    name: proxy-vpn_security_data
