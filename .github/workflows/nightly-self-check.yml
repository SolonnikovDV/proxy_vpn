name: Nightly Self Check

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

jobs:
  self_check:
    runs-on: ubuntu-latest
    environment:
      name: production
    concurrency:
      group: proxy-vpn-nightly-self-check
      cancel-in-progress: true

    env:
      SSH_HOST: ${{ secrets.SSH_HOST != '' && secrets.SSH_HOST || vars.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER != '' && secrets.SSH_USER || vars.SSH_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      VPN_PANEL_DOMAIN: ${{ vars.VPN_PANEL_DOMAIN }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Integrity contract checks (repo/bootstrap env)
        run: |
          set -euo pipefail
          INTEGRITY_SCOPE=ci bash ./scripts/integrity-check.sh

      - name: Evaluate optional self-check inputs
        run: |
          set -euo pipefail
          missing=()
          for name in SSH_HOST SSH_USER DEPLOY_PATH; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done

          remote_ready=1
          if [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            remote_ready=0
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            remote_ready=0
          fi

          if [ "${remote_ready}" = "1" ]; then
            echo "REMOTE_EXECUTION_READY=1" >> "$GITHUB_ENV"
            echo "Remote nightly self-check inputs are present."
          else
            echo "REMOTE_EXECUTION_READY=0" >> "$GITHUB_ENV"
            echo "Remote nightly self-check is optional and will be skipped."
            if [ "${#missing[@]}" -gt 0 ]; then
              echo "Missing connection inputs: ${missing[*]}"
            fi
            if [ -z "${DEPLOY_SSH_KEY:-}" ]; then
              echo "Missing secret: DEPLOY_SSH_KEY"
            fi
          fi

      - name: Remote self-check status (non-blocking)
        if: ${{ env.REMOTE_EXECUTION_READY != '1' }}
        run: |
          echo "CI stability checks remain valid; remote self-check inputs are incomplete."
          echo "Blocked in this workflow while remote inputs are incomplete:"
          echo "  - Setup SSH key (webfactory/ssh-agent)"
          echo "  - Add host to known_hosts"
          echo "  - Check stack on target host (SSH)"

      - name: Setup SSH key
        if: ${{ env.REMOTE_EXECUTION_READY == '1' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        if: ${{ env.REMOTE_EXECUTION_READY == '1' }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Check stack on target host (SSH key)
        if: ${{ env.REMOTE_EXECUTION_READY == '1' }}
        run: |
          ssh "${SSH_USER}@${SSH_HOST}" "
            set -euo pipefail
            cd '${DEPLOY_PATH}'
            MODE=prod HEALTH_TIMEOUT=120 bash ./scripts/healthcheck-stack.sh
            if docker compose version >/dev/null 2>&1; then
              docker compose -f compose.yaml -f compose.prod.yaml ps
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose -f compose.yaml -f compose.prod.yaml ps
            else
              echo 'Docker Compose not found on target host'
              exit 1
            fi
          "

      - name: External HTTPS health check
        if: ${{ env.REMOTE_EXECUTION_READY == '1' }}
        run: |
          set -euo pipefail
          if [ -z "${VPN_PANEL_DOMAIN:-}" ]; then
            echo "VPN_PANEL_DOMAIN is not set, skip external HTTPS health check"
            exit 0
          fi
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 "https://${VPN_PANEL_DOMAIN}/health" >/dev/null; then
              echo "External health check passed"
              exit 0
            fi
            sleep 3
          done
          echo "External health check failed"
          exit 1
