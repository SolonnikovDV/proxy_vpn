name: CI Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  sensitive_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail-fast sensitive data audit
        run: |
          set -euo pipefail
          bash ./scripts/audit-sensitive.sh

  checks:
    needs: sensitive_audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Integrity contract checks
        run: |
          set -euo pipefail
          INTEGRITY_SCOPE=ci bash ./scripts/integrity-check.sh

      - name: Run smoke tests
        run: |
          set -euo pipefail
          bash ./scripts/test-smoke.sh
